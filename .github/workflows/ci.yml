name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: umaine_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/umaine_test
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          VAPID_PRIVATE_KEY: ""
          VAPID_PUBLIC_KEY: ""
        run: python manage.py migrate --settings=config.settings.test

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/umaine_test
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          VAPID_PRIVATE_KEY: ""
          VAPID_PUBLIC_KEY: ""
        run: |
          pip install coverage --quiet
          coverage run --source=apps,core manage.py test apps --settings=config.settings.test --verbosity=2
          coverage report
          coverage xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
          VITE_MEDIA_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
          VITE_VAPID_PUBLIC_KEY: ""
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # Required GitHub Secrets:
      #   VPS_HOST   — your VPS IP address or hostname
      #   VPS_USER   — deploy user (e.g. "deploy")
      #   VPS_SSH_KEY — private SSH key (paste the full PEM key including header/footer)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/umanie
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements/base.txt --quiet
            python manage.py migrate --settings=config.settings.production --noinput
            python manage.py collectstatic --settings=config.settings.production --noinput
            cd ../frontend
            npm ci --quiet
            npm run build
            sudo supervisorctl restart umanie-django umanie-celery umanie-celerybeat
            echo "Deployment complete"


