# Nginx config for bare-VPS deployment (no Docker)
# Place at: /etc/nginx/sites-available/umanie
# Enable: sudo ln -s /etc/nginx/sites-available/umanie /etc/nginx/sites-enabled/
# SSL is handled by Certbot / Let's Encrypt per domain.

# Catch-all server block — handles ALL tenant domains routed to this VPS.
# Each tenant domain's DNS A record points here; Nginx forwards to Gunicorn.
# TenantMiddleware reads the Host header and resolves the correct tenant.

server {
    listen 80;
    server_name _;  # catch-all

    client_max_body_size 50M;

    # Serve collected static files directly from disk (WhiteNoise handles this
    # inside Gunicorn too, but serving from Nginx is faster for static assets)
    location /static/ {
        alias /home/ubuntu/umanie/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve uploaded media files directly (no S3 — local filesystem)
    location /media/ {
        alias /home/ubuntu/umanie/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket connections (Django Channels / live chat)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # All other requests → Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 30;
    }
}
